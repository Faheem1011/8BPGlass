name: Build 8BPGlass APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: gradle

      - name: Build Native Library (NDK)
        run: |
          $ANDROID_NDK_HOME/ndk-build NDK_PROJECT_PATH=. APP_BUILD_SCRIPT=jni/Android.mk
          
      - name: Prepare jniLibs for Gradle
        run: |
          mkdir -p app/src/main/jniLibs
          cp -R libs/* app/src/main/jniLibs/
          
      - name: Build with Gradle
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: 8BPGlass-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
